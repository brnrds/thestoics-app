services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rag:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/data/stoics.db}
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      PORT: "3000"
      RAG_SERVER_URL: ${RAG_SERVER_URL:-http://rag:8000}
    ports:
      - "127.0.0.1:3120:3000"
    restart: unless-stopped
    volumes:
      - stoics_sqlite_data:/data

  rag:
    build:
      context: ./services/rag-server
      dockerfile: Dockerfile
    command:
      - sh
      - -lc
      - python -m app.cli ingest && exec uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      CHROMA_PATH: /data/chroma
      DATA_PATH: /workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    volumes:
      - .:/workspace:ro
      - stoics_rag_data:/data

volumes:
  stoics_rag_data:
  stoics_sqlite_data:
