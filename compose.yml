services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rag:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://stoics:stoics_dev_password@postgres:5432/stoics?schema=public}
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      PORT: "3000"
      RAG_SERVER_URL: ${RAG_SERVER_URL:-http://rag:8000}
    ports:
      - "127.0.0.1:3120:3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stoics}
      POSTGRES_USER: ${POSTGRES_USER:-stoics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stoics_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-stoics} -d $${POSTGRES_DB:-stoics}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - stoics_postgres_data:/var/lib/postgresql/data

  rag:
    build:
      context: ./services/rag-server
      dockerfile: Dockerfile
    command:
      - sh
      - -lc
      - python -m app.cli ingest && exec uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      CHROMA_PATH: /data/chroma
      DATA_PATH: /workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    volumes:
      - .:/workspace:ro
      - stoics_rag_data:/data

volumes:
  stoics_rag_data:
  stoics_postgres_data:
